<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <title>Task Management Dashboard</title>
</head>
<body>
    <nav>
        <div>Logo</div>
        <ul>
            <li><a>Dashboard</a></li>
            <li><a>My Tasks</a></li>
            <li><a>Completed</a></li>
            <li><a>Settings</a></li>
        </ul>
        <button>New Task Button</button>
    </nav>
    <section id="dashboard">
        <h1>Top Header</h1>
        <h2>Dashboard Title</h2>
        <h2>User/Profile Circle</h2>
    </section>
    <section id="searchbar">
        <h2>Search Tasks...</h2>
    </section>
    <section id="task-area">
        <h3>TO DO</h3>
        <h3>IN PROGRESS</h3>
        <h3>COMPLETE</h3>
    </section>
</body>
</html>
